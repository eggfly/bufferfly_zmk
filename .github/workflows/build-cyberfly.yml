name: Build CyberFly

on:
  push:
    paths:
      - ".github/workflows/build-cyberfly.yml"
      - "app/boards/shields/cyberfly/**"
      - "app/src/**"
  pull_request:
    paths:
      - ".github/workflows/build-cyberfly.yml"
      - "app/boards/shields/cyberfly/**"
  workflow_dispatch:

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Cache west modules
        uses: actions/cache@v4
        env:
          cache-name: cache-zephyr-modules
        with:
          path: |
            modules/
            tools/
            zephyr/
            bootloader/
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('app/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
        timeout-minutes: 2
        continue-on-error: true

      - name: Initialize workspace (west init)
        run: west init -l app

      - name: Update modules (west update)
        run: west update --fetch-opt=--filter=tree:0

      - name: Export Zephyr CMake package (west zephyr-export)
        run: west zephyr-export

      - name: Build firmware
        run: west build -s app -b nice_nano_nrf52840_zmk -- -DSHIELD=cyberfly

      - name: Rename UF2 artifact
        run: cp build/zephyr/zmk.uf2 cyberfly-nice_nano_nrf52840.uf2

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: cyberfly-nice_nano_nrf52840
          path: cyberfly-nice_nano_nrf52840.uf2
